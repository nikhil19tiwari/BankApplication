spring.application.name=project
# Set the server port
server.port=9999
# Set the context path for the application
server.servlet.context-path=/online
# Actuator / Management endpoints
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.env.show-values=always


# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# profiles
spring.profiles.active=dev

# JWT configuration
# IMPORTANT: Replace the following secret with a secure value in production. Use an environment variable or Secrets Manager.
# The secret must be at least 32 characters (preferably 256-bit) for HS256. You can provide a base64-encoded key as well.
jwt.secret=change_this_to_a_long_secure_secret_please_change_me
# Token lifetime in milliseconds (default 1 hour)
jwt.expiration-ms=3600000